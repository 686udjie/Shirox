name: yuhanime
options:
  bundleIdPrefix: com.yuhanime
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "15"

targets:
  yuhanime:
    type: application
    platform: [iOS, macOS]
    sources:
      - path: yuhanime
    dependencies:
      - sdk: JavaScriptCore.framework
      - sdk: WebKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yuhanime.app
        SWIFT_VERSION: "5.9"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SUPPORTS_MACCATALYST: NO
        # macOS native (not Catalyst)
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        INFOPLIST_FILE: yuhanime/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: JRMTH65Z3H
